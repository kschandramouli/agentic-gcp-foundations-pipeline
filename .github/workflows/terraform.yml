name: Terraform Plan and Apply
# Updated: trigger run after support team applied WIF principalSet binding

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      terraform_version:
        description: 'Terraform version to use'
        required: false
        default: '1.10.5'
      plan_only:
        description: 'Run plan only (true/false)'
        required: false
        default: 'false'

env:
  TF_VERSION: ${{ github.event.inputs.terraform_version || '1.10.5' }}
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_admin_group_email: ${{ secrets.ADMIN_GROUP_EMAIL }}
  TF_VAR_github_repo_owner: ${{ github.repository_owner }}
  TF_VAR_github_repo_name: ${{ github.event.repository.name }}

jobs:
  terraform-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive

  security-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    needs: terraform-validation
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: './terraform'
          format: 'sarif'
          out_dir: '.'

      - name: Upload tfsec results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: tfsec.sarif
          category: tfsec

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          output_format: cli
          quiet: false
          soft_fail: true

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [terraform-validation, security-scan]
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP using Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -no-color

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate -no-color

      - name: Terraform Plan
        working-directory: ./terraform
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -json tfplan > plan.json
        continue-on-error: true

      - name: Generate Plan Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = process.env.PLAN;
            
            const comment = `## 📋 Terraform Plan Summary
            
            ### Plan Details
            \`\`\`
            ${plan}
            \`\`\`
            
            **Status**: ${{ job.status }}
            
            - Plan created at: ${new Date().toISOString()}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true

      - name: Comment PR on Plan Failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Terraform plan failed. Please review the logs above.'
            });

      - name: Upload Plan Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 7

      - name: Upload Plan JSON
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-json
          path: terraform/plan.json
          retention-days: 7

  manual-approval:
    name: Manual Approval for Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: Production
    steps:
      - name: Await Manual Approval
        run: |
          echo "Awaiting manual approval to apply Terraform changes..."
          echo "Review the plan artifacts and approve to proceed with apply."

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-plan, manual-approval]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP using Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -no-color

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform/

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -no-color -auto-approve tfplan

      - name: Extract Outputs
        working-directory: ./terraform
        id: outputs
        run: |
          terraform output -json > outputs.json
          cat outputs.json

      - name: Upload Apply Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform/outputs.json
          retention-days: 30

      - name: Create Deployment Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const outputs = JSON.parse(fs.readFileSync('./terraform/outputs.json', 'utf8'));
            
            const summary = `## ✅ Terraform Apply Completed
            
            ### Deployment Details
            - **Branch**: ${context.ref}
            - **Commit**: ${context.sha.substring(0, 7)}
            - **Time**: ${new Date().toISOString()}
            
            ### Key Outputs
            - **Service Account Email**: ${outputs.service_account_email?.value || 'N/A'}
            - **WIF Provider**: ${outputs.workload_identity_provider?.value || 'N/A'}
            - **GCP Project ID**: ${outputs.github_action_config?.value?.gcp_project_id || 'N/A'}
            
            [View full workflow run](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;
            
            console.log(summary);
